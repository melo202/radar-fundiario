name: Deploy Radar ao GitHub Pages

# Deploy oficial e serializado (acaba com as falhas intermitentes do "Deploy from a branch").
# PARA ATIVAR (uma vez): Settings ▸ Pages ▸ Source: "GitHub Actions".
# Publica SÓ os arquivos do app — docs internos (ROADMAP, PESQUISA, AUDITORIA…) ficam no repo, fora do site.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Montar pasta pública só com o app
        run: |
          mkdir _site
          cp index.html radar-goiania.html caixa-goiania.js sw.js manifest.json \
             icon-192.png icon-512.png apple-touch-icon.png README.md _site/
          # datasets do app — o mapa 404a sem eles. bairros-goiania.json é obrigatório;
          # bairro-cdbairro.json idem (lookup do Meu Território — fetch em runtime, faltava aqui
          # e o 404 degradava o recurso em produção); os demais copiados só se existirem.
          cp bairros-goiania.json bairro-cdbairro.json limite-goiania.json _site/
          for f in logradouros-goiania.json bairros-goiania.report.md; do [ -f "$f" ] && cp "$f" _site/ || true; done
          echo "Arquivos publicados:"; ls -1 _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
