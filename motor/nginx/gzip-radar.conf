# Compressão do site — instalado em /etc/nginx/conf.d/gzip-radar.conf (contexto http).
# AUD-03 (20/07/2026): o nginx.conf padrão do Ubuntu vem com "gzip on" mas gzip_types
# comentado — só text/html comprimia; bairros-goiania.json (782 KB) e logradouros
# desciam crus. Nível 5 ≈ metade do tamanho do nível 1 no HTML de 968 KB, CPU ainda barata.
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 512;
gzip_types text/plain text/css application/json application/javascript text/javascript
           text/xml application/xml application/xml+rss image/svg+xml application/manifest+json;
