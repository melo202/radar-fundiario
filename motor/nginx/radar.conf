# Site do Corretor Inteligente — instalado em /etc/nginx/sites-available/radar (link em
# sites-enabled). Versionado no repo desde 20/07/2026 (AUD-03: mesma lição do proxy — config
# de produção não vive só editada à mão no VPS). Instalação é manual e consciente:
#   scp motor/nginx/radar-sec.conf radar-vps:/etc/nginx/snippets/radar-sec.conf
#   scp motor/nginx/radar.conf radar-vps:/etc/nginx/sites-available/radar
#   ssh radar-vps "nginx -t && systemctl reload nginx"
# (deploy-*.sh NÃO tocam aqui de propósito: erro de nginx derruba o site inteiro.)

# App — corretorinteligente.tech (e www)
server {
  server_name corretorinteligente.tech www.corretorinteligente.tech;
  root /var/www/radar;
  index index.html;
  include snippets/radar-sec.conf;

  # ^~ = prefixo vence as locations regex de cache abaixo (rota de proxy nunca cai no try_files)
  location ^~ /arcgis/ { proxy_pass http://127.0.0.1:8130; proxy_set_header Host $host; }
  location = /health { proxy_pass http://127.0.0.1:8130/health; }
  location ^~ /acompanhe/ { proxy_pass http://127.0.0.1:8140; proxy_set_header X-Forwarded-For $remote_addr; }
  location = / { rewrite ^ /radar-goiania.html last; }

  # AUD-03 (auditoria 20/07/2026): cache de borda honesto —
  # · HTML e service worker SEMPRE revalidam (deploy aparece na hora; 304 é barato — antes,
  #   sem Cache-Control, o navegador aplicava cache heurístico e podia segurar versão velha);
  # · dados versionados por deploy (json/js) ficam 1 h + stale-while-revalidate;
  # · marca/ícones mudam raramente (7 dias).
  location = /sw.js { include snippets/radar-sec.conf; add_header Cache-Control "no-cache"; try_files $uri =404; }
  location ~* \.html$ { include snippets/radar-sec.conf; add_header Cache-Control "no-cache"; try_files $uri =404; }
  location ~* \.(json|js|webmanifest|xml|txt)$ { include snippets/radar-sec.conf; add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400"; try_files $uri =404; }
  location ~* \.(png|jpe?g|svg|ico|webp)$ { include snippets/radar-sec.conf; add_header Cache-Control "public, max-age=604800"; try_files $uri =404; }
  location / { try_files $uri $uri/ =404; }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/corretorinteligente.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/corretorinteligente.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# API — api.corretorinteligente.tech (proxy CORS + motor de preço + painel)
server {
  server_name api.corretorinteligente.tech;
  location /arcgis/ { proxy_pass http://127.0.0.1:8130; proxy_set_header Host $host; }
  location = /health { proxy_pass http://127.0.0.1:8130/health; }
  location /motor/ { proxy_pass http://127.0.0.1:8140; proxy_read_timeout 600s; proxy_set_header X-Forwarded-For $remote_addr; }
  location /painel { proxy_pass http://127.0.0.1:8140; proxy_set_header X-Forwarded-For $remote_addr; }
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  location / { return 200 "radar-api ok\n"; add_header Content-Type text/plain; }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/corretorinteligente.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/corretorinteligente.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Acesso direto por IP continua respondendo o básico
server {
  listen 80 default_server;
  server_name _;
  location /arcgis/ { proxy_pass http://127.0.0.1:8130; proxy_set_header Host $host; }
  location = /health { proxy_pass http://127.0.0.1:8130/health; }
  location / { return 200 "radar-vps ok\n"; add_header Content-Type text/plain; }
}

server {
    if ($host = www.corretorinteligente.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = corretorinteligente.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  listen 80;
  server_name corretorinteligente.tech www.corretorinteligente.tech;
    return 404; # managed by Certbot
}

server {
    if ($host = api.corretorinteligente.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  listen 80;
  server_name api.corretorinteligente.tech;
    return 404; # managed by Certbot
}
