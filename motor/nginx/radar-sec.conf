# Cabeçalhos de segurança do site estático — instalado em /etc/nginx/snippets/radar-sec.conf.
# add_header dentro de um location SUPRIME os herdados do server{} (regra do nginx); por isso
# os headers viraram snippet: cada location que declara Cache-Control re-inclui este arquivo.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
